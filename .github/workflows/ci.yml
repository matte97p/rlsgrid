name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_USER: postgres
          POSTGRES_DB: rlsgrid_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Lint
        run: ruff check src tests
      - name: Unit tests
        # DB-backed paths are covered by the live smoke + pgtap jobs; the
        # unit floor here just guards against a catastrophic drop in the
        # pure-logic modules.
        run: pytest -q --cov=rlsgrid --cov-report=term-missing --cov-fail-under=50
      - name: Smoke test CLI against live Postgres
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/rlsgrid_test
        run: |
          psql "$DATABASE_URL" -f examples/blog/schema.sql
          rlsgrid introspect --config examples/rlsgrid.toml
          rlsgrid plan --config examples/rlsgrid.toml
          rlsgrid gen pgtap --config examples/rlsgrid.toml --out /tmp/generated.sql
          test -s /tmp/generated.sql
          rlsgrid seed --config examples/rlsgrid.toml --tenants 3 --state-out /tmp/seed-state.json
          test -s /tmp/seed-state.json
          rlsgrid gen pgtap --config examples/rlsgrid.toml --from-state /tmp/seed-state.json --out /tmp/generated-cond.sql
          test -s /tmp/generated-cond.sql
          rlsgrid fuzz --config examples/rlsgrid.toml --tenants 3 \
            --shields-out /tmp/badge.json --badge-out /tmp/badge.svg
          test -s /tmp/badge.json && test -s /tmp/badge.svg
          rlsgrid teardown --config examples/rlsgrid.toml --state /tmp/seed-state.json
      - name: Smoke test against the rich multi-tenant schema
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/rlsgrid_mt
        run: |
          psql "postgresql://postgres:postgres@localhost:5432/postgres" -c 'CREATE DATABASE rlsgrid_mt;'
          psql "$DATABASE_URL" -f examples/multitenant/schema.sql
          rlsgrid introspect --config examples/multitenant/rlsgrid.toml
          rlsgrid plan --config examples/multitenant/rlsgrid.toml --json > /tmp/mt-plan.json
          test -s /tmp/mt-plan.json
          # Seed must produce rows on the FK-chained schema (regression guard for
          # the tenant-root seeding bug fixed in 0.1.1).
          rlsgrid seed --config examples/multitenant/rlsgrid.toml --tenants 3 --state-out /tmp/mt-seed.json --json > /tmp/mt-seed-out.json
          python -c "import json; d=json.load(open('/tmp/mt-seed-out.json')); rows=sum(sum(t['rows_per_table'].values()) for t in d['tenants']); print('seeded rows:', rows); assert rows >= 12, 'tenant-root seeding regressed'"
          rlsgrid gen pgtap --config examples/multitenant/rlsgrid.toml --from-state /tmp/mt-seed.json --out /tmp/mt-gen.sql
          grep -qv ctid /tmp/mt-gen.sql
          ! grep -q 'SET ctid' /tmp/mt-gen.sql
          rlsgrid fuzz --config examples/multitenant/rlsgrid.toml --tenants 3
          rlsgrid teardown --config examples/multitenant/rlsgrid.toml --state /tmp/mt-seed.json
          # init --from-db should detect org_id + the orgs root table.
          rlsgrid init --from-db --out /tmp/auto.toml --force
          grep -q 'tenant_column = "org_id"' /tmp/auto.toml
          # one-shot check must run clean (no skipped probes) and leave nothing behind.
          rlsgrid check --config /tmp/auto.toml --tenants 3 --json > /tmp/check.json
          python -c "import json; d=json.load(open('/tmp/check.json')); assert d['ok'], d; assert d['skipped']==0, d['skip_reasons']"
          python -c "import os,psycopg; c=psycopg.connect(os.environ['DATABASE_URL']); cur=c.cursor(); cur.execute('SELECT count(*) FROM public.orgs'); n=cur.fetchone()[0]; assert n==0, f'{n} rows left after check'"

  pgtap:
    # Generate the pgTAP suite against the rich schema and actually run it
    # with pg_prove, so "rlsgrid emits a passing pgTAP suite" is proven in CI.
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - name: Install rlsgrid
        run: |
          python -m pip install --upgrade pip
          pip install -e .
      - name: Install Postgres 16, pgTAP and pg_prove
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-common
          sudo /usr/share/postgresql-common/pgdg/apt.postgresql.org.sh -y
          sudo apt-get install -y postgresql-16 postgresql-16-pgtap libtap-parser-sourcehandler-pgtap-perl
      - name: Start Postgres + prepare database
        run: |
          sudo pg_ctlcluster 16 main start
          sudo -u postgres psql -c "ALTER USER postgres PASSWORD 'postgres';"
          sudo -u postgres createdb rlsgrid_pgtap
          psql "postgresql://postgres:postgres@localhost:5432/rlsgrid_pgtap" -f examples/multitenant/schema.sql
          psql "postgresql://postgres:postgres@localhost:5432/rlsgrid_pgtap" -c "CREATE EXTENSION pgtap;"
      - name: Generate and run the pgTAP suite
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/rlsgrid_pgtap
          PGPASSWORD: postgres
        run: |
          rlsgrid seed --config examples/multitenant/rlsgrid.toml --tenants 3 --state-out /tmp/seed.json
          rlsgrid gen pgtap --config examples/multitenant/rlsgrid.toml --from-state /tmp/seed.json --out /tmp/suite.sql
          pg_prove -d rlsgrid_pgtap -h localhost -U postgres /tmp/suite.sql

  action-smoke:
    runs-on: ubuntu-latest
    needs: test
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_USER: postgres
          POSTGRES_DB: rlsgrid_action_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=10
    steps:
      - uses: actions/checkout@v4
      - name: Apply schema
        env:
          PGPASSWORD: postgres
        run: psql -h localhost -U postgres -d rlsgrid_action_test -f examples/blog/schema.sql
      - name: Run composite action against itself
        uses: ./
        with:
          command: plan
          config: examples/rlsgrid.toml
          database-url: postgresql://postgres:postgres@localhost:5432/rlsgrid_action_test
